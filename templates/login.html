{% extends "base.html" %}

{% block styles %}
<style>
    /* Super-Compact Authentication Card Architecture */
    .auth-wrapper-zone {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 14px;
    }

    .login-container-card {
        width: 100%;
        max-width: 380px;
        background: #ffffff; 
        border: 1px solid var(--border-flat); 
        border-radius: 20px; 
        padding: 24px;
        box-shadow: 0 4px 20px rgba(12, 131, 31, 0.02) !important;
    }

    .auth-header-block {
        text-align: center;
        margin-bottom: 20px;
    }

    .brand-icon-circle {
        width: 48px; height: 48px;
        background: var(--supermarket-green-light);
        border: 1px solid var(--supermarket-green-border);
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 10px;
        color: var(--supermarket-green);
    }

    .auth-title {
        font-weight: 800; 
        font-size: 20px; 
        letter-spacing: -0.03em; 
        color: var(--text-main); 
        margin-bottom: 2px;
    }

    .auth-subtitle {
        color: var(--text-muted); 
        font-size: 12.5px;
        margin-bottom: 0;
    }

    .form-group-row {
        margin-bottom: 12px;
    }

    .form-label {
        font-weight: 700;
        color: var(--text-main);
        font-size: 11px;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        display: block;
    }

    /* Seamless Oval Inputs */
    .login-input-field {
        border-radius: var(--radius-pill) !important;
        border: 1px solid var(--border-flat) !important;
        height: 40px;
        font-size: 13px;
        color: var(--text-main);
        background-color: var(--canvas-white);
        padding-left: 38px !important;
        transition: all 0.2s ease !important;
    }

    .login-input-field:focus {
        border-color: var(--supermarket-green) !important;
        background-color: var(--supermarket-green-light) !important;
        box-shadow: none !important;
    }

    .input-icon-vector {
        position: absolute; 
        left: 14px; 
        top: 50%; 
        transform: translateY(-50%); 
        color: var(--supermarket-green);
        width: 14px;
        height: 14px;
    }

    /* Action Buttons Architecture */
    .btn-login-submit {
        background: var(--supermarket-green) !important;
        color: #ffffff !important;
        border: none !important;
        border-radius: var(--radius-pill) !important;
        height: 40px;
        font-size: 13.5px;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 4px;
        transition: transform 0.15s ease, background-color 0.15s ease !important;
    }

    .btn-login-submit:hover {
        background: var(--supermarket-green-dark) !important;
        transform: translateY(-1px);
    }

    .divider-row {
        display: flex; 
        align-items: center; 
        gap: 10px; 
        margin: 16px 0;
    }

    .divider-line {
        flex: 1; 
        height: 1px; 
        background: var(--border-flat);
    }

    .divider-text {
        font-size: 10.5px; 
        color: var(--text-sub); 
        font-weight: 700; 
        text-transform: uppercase; 
        letter-spacing: 0.05em;
    }

    .btn-login-secondary {
        background: var(--supermarket-green-light) !important;
        color: var(--supermarket-green) !important;
        border: 1px solid var(--supermarket-green-border) !important;
        border-radius: var(--radius-pill) !important;
        height: 40px;
        font-size: 13px;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.15s ease !important;
    }

    .btn-login-secondary:hover {
        background: var(--border-flat) !important;
    }

    .auth-footer-text {
        text-align: center; 
        margin-top: 14px; 
        font-size: 11px; 
        color: var(--text-muted); 
        line-height: 1.3;
        margin-bottom: 0;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper-zone">
    <div class="login-container-card">

        <!-- HEADER BANNER MODULE -->
        <div class="auth-header-block">
            <div class="brand-icon-circle">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            </div>
            <h3 class="auth-title">Welcome Back</h3>
            <p class="auth-subtitle">Log in to open your shopping session</p>
        </div>

        <!-- TRANSACTION INPUT INTERFACES -->
        <form method="POST" id="login-form" novalidate>
            <div class="form-group-row">
                <label class="form-label">Email / Username</label>
                <div style="position: relative;">
                    <svg class="input-icon-vector" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" name="email" class="form-control login-input-field" placeholder="Username or email" id="login-email">
                </div>
            </div>
            
            <div class="form-group-row" style="margin-bottom: 16px;">
                <label class="form-label">Password</label>
                <div style="position: relative;">
                    <svg class="input-icon-vector" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" name="password" class="form-control login-input-field" placeholder="••••••••" id="login-password">
                </div>
            </div>

            <button type="submit" class="btn btn-login-submit w-100" id="login-btn">
                <span id="login-btn-text">Log in</span>
                <span id="login-spinner" class="spinner-border spinner-border-sm d-none ms-2" style="width: 13px; height: 13px; border-width: 2px;"></span>
            </button>
        </form>

        <div class="divider-row">
            <div class="divider-line"></div>
            <span class="divider-text">New to QuickTrolly?</span>
            <div class="divider-line"></div>
        </div>

        <a href="{{ url_for('signup') }}" class="btn btn-login-secondary w-100">
            Create new account
        </a>

        <p class="auth-footer-text">
            By continuing, you accept our service conditions framework.
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', function (e) {
    var emailNode = document.getElementById('login-email');
    var passNode = document.getElementById('login-password');
    
    if (!emailNode.value.trim() || !passNode.value.trim()) {
        e.preventDefault(); 
        if (window.QtToast) {
            QtToast.show('Please complete all form inputs', 'error'); 
        } else {
            alert('Please complete all form inputs');
        }
        return;
    }
    document.getElementById('login-btn').disabled = true;
    document.getElementById('login-btn-text').textContent = 'Authenticating...';
    document.getElementById('login-spinner').classList.remove('d-none');
});
</script>
{% endblock %}
